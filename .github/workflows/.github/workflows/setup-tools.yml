name: Setup Tools

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create bin directory
        run: mkdir -p bin

      - name: Download yt-dlp
        run: |
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux -o bin/yt-dlp_linux
          chmod +x bin/yt-dlp_linux

      - name: Download sing-box
        run: |
          curl -L https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-1.11.0-linux-amd64.tar.gz -o sing-box.tar.gz
          tar xzf sing-box.tar.gz
          cp sing-box-*/sing-box bin/
          chmod +x bin/sing-box

      - name: Commit and push tools
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add bin/
          git commit -m "Add tools: yt-dlp and sing-box" || echo "Nothing to commit"
          git push
