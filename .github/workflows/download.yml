name: YouTube Downloader with WARP Proxy

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Quality'
        required: false
        default: 'best'
        type: choice
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'
          - '144'
          - 'best'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set execute permissions for local tools
        run: chmod +x bin/yt-dlp_linux bin/ffmpeg bin/ffprobe

      - name: Start WARP SOCKS5 proxy (Docker)
        run: |
          docker run -d \
            --name warp \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp

          for i in $(seq 1 30); do
            RESPONSE=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESPONSE" | grep -qE "warp=(on|plus)"; then
              echo "WARP proxy is ready on port 1080"
              break
            fi
            sleep 1
          done

      # =====================================================
      # STRATEGY 1
      # =====================================================
      - name: Strategy 1 - Chrome impersonation with Deno
        id: strategy1
        continue-on-error: true
        run: |
          if [ "${{ github.event.inputs.quality }}" = "best" ]; then
            fmt="bestvideo+bestaudio/best"
          else
            fmt="bestvideo[height<=${{ github.event.inputs.quality }}]+bestaudio/best[height<=${{ github.event.inputs.quality }}]"
          fi
          ./bin/yt-dlp_linux \
            --proxy socks5://127.0.0.1:1080 \
            --js-runtimes deno \
            --impersonate chrome \
            -f "$fmt" \
            --merge-output-format mp4 \
            --ffmpeg-location ./bin/ffmpeg \
            -o "downloads/%(id)s/%(title)s.%(ext)s" \
            --no-playlist \
            "${{ github.event.inputs.video_url }}"

      # =====================================================
      # STRATEGY 2
      # =====================================================
      - name: Strategy 2 - Android + IOS client with Deno
        id: strategy2
        if: steps.strategy1.outcome == 'failure'
        continue-on-error: true
        run: |
          if [ "${{ github.event.inputs.quality }}" = "best" ]; then
            fmt="bestvideo+bestaudio/best"
          else
            fmt="bestvideo[height<=${{ github.event.inputs.quality }}]+bestaudio/best[height<=${{ github.event.inputs.quality }}]"
          fi
          ./bin/yt-dlp_linux \
            --proxy socks5://127.0.0.1:1080 \
            --js-runtimes deno \
            -f "$fmt" \
            --merge-output-format mp4 \
            --ffmpeg-location ./bin/ffmpeg \
            --extractor-args "youtube:player_client=android,ios" \
            -o "downloads/%(id)s/%(title)s.%(ext)s" \
            --no-playlist \
            "${{ github.event.inputs.video_url }}"

      # =====================================================
      # STRATEGY 3
      # =====================================================
      - name: Strategy 3 - With cookies
        id: strategy3
        if: steps.strategy2.outcome == 'failure' && env.YT_COOKIES != ''
        continue-on-error: true
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
          if [ "${{ github.event.inputs.quality }}" = "best" ]; then
            fmt="bestvideo+bestaudio/best"
          else
            fmt="bestvideo[height<=${{ github.event.inputs.quality }}]+bestaudio/best[height<=${{ github.event.inputs.quality }}]"
          fi
          ./bin/yt-dlp_linux \
            --proxy socks5://127.0.0.1:1080 \
            -f "$fmt" \
            --merge-output-format mp4 \
            --ffmpeg-location ./bin/ffmpeg \
            --cookies cookies.txt \
            -o "downloads/%(id)s/%(title)s.%(ext)s" \
            --no-playlist \
            "${{ github.event.inputs.video_url }}"
        env:
          YT_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      # =====================================================
      # VERIFY DOWNLOAD
      # =====================================================
      - name: Check if download succeeded
        run: |
          rm -f downloads/.gitkeep
          if [ -d downloads ] && [ "$(ls -A downloads 2>/dev/null)" ]; then
            echo "Download successful!"
            ls -lh downloads/
          else
            echo "Download failed."
            exit 1
          fi

      # =====================================================
      # ORGANIZE, VERIFY, COMPRESS & PUSH
      # =====================================================
      - name: Organize, verify and compress files
        if: success()
        run: |
          ZIP_PASS=$(openssl rand -base64 16)
          echo "ZIP_PASSWORD=${ZIP_PASS}" >> $GITHUB_ENV

          if ls downloads/**/*.mp4 1>/dev/null 2>&1; then
            for f in downloads/**/*.mp4; do
              echo "Verifying $f"
              ./bin/ffprobe -v error -show_entries format=duration,bit_rate,size -of default=noprint_wrappers=1 "$f"
            done

            for dir in downloads/*/; do
              folder_name=$(basename "$dir")
              cd downloads
              echo "${ZIP_PASS}" > "${folder_name}_password.txt"
              zip -P "${ZIP_PASS}" -r "${folder_name}.zip" "$folder_name"
              find . -name "${folder_name}.zip" -size +40M | while read z; do
                split -b 45M -d "$z" "${z%.zip}.part-"
                rm "$z"
              done
              rm -rf "$folder_name"
              cd ..
            done
          fi

      # =====================================================
      # GENERATE INDEX AND VIDEO INFO PAGES
      # =====================================================
      - name: Generate index and video info pages
        if: success()
        run: |
          REPO=${{ github.repository }}
          BRANCH="main"

          # Create header for the index file
          INDEX="downloads/index.md"
          echo "# Downloaded Videos" > "$INDEX"
          echo "" >> "$INDEX"
          echo "| # | Title | Quality | Video ID | Details |" >> "$INDEX"
          echo "|---|-------|---------|----------|---------|" >> "$INDEX"

          # Loop over all video ID folders (we have them as zip or part files)
          for zip_or_part in downloads/*.zip downloads/*.part-00; do
            [ -f "$zip_or_part" ] || continue

            # Extract the video ID from the file name
            base=$(basename "$zip_or_part")
            if [[ "$base" == *.zip ]]; then
              video_id="${base%.zip}"
            elif [[ "$base" == *.part-00 ]]; then
              video_id=$(echo "$base" | sed 's/\.mp4\.part-00//')
            else
              continue
            fi

            # Get video title (using yt-dlp, may require proxy still active)
            TITLE=$(./bin/yt-dlp_linux --proxy socks5://127.0.0.1:1080 --get-title "https://www.youtube.com/watch?v=${video_id}" 2>/dev/null || echo "Unknown Title")
            QUALITY="${{ github.event.inputs.quality }}"
            ORIGINAL_URL="https://www.youtube.com/watch?v=${video_id}"

            # Count parts
            PARTS=()
            for p in downloads/${video_id}.mp4.part-*; do
              [ -f "$p" ] && PARTS+=("$(basename "$p")")
            done

            # --- Create video info page ---
            INFO_PAGE="downloads/${video_id}.md"
            echo "# ${TITLE}" > "$INFO_PAGE"
            echo "" >> "$INFO_PAGE"
            echo "- **Original URL:** [${ORIGINAL_URL}](${ORIGINAL_URL})" >> "$INFO_PAGE"
            echo "- **Quality:** ${QUALITY}" >> "$INFO_PAGE"
            echo "- **Video ID:** ${video_id}" >> "$INFO_PAGE"
            echo "- **Zip Password:** \`${ZIP_PASS}\`" >> "$INFO_PAGE"
            echo "" >> "$INFO_PAGE"

            if [ ${#PARTS[@]} -gt 0 ]; then
              echo "## Download Parts" >> "$INFO_PAGE"
              echo "" >> "$INFO_PAGE"
              echo "File split into ${#PARTS[@]} parts:" >> "$INFO_PAGE"
              echo "" >> "$INFO_PAGE"
              for p in "${PARTS[@]}"; do
                echo "- [${p}](https://raw.githubusercontent.com/${REPO}/${BRANCH}/downloads/${p})" >> "$INFO_PAGE"
              done
              echo "" >> "$INFO_PAGE"
              echo "To combine the parts, run:" >> "$INFO_PAGE"
              echo "\`\`\`bash" >> "$INFO_PAGE"
              echo "cat ${video_id}.mp4.part-* > ${video_id}.mp4.zip" >> "$INFO_PAGE"
              echo "\`\`\`" >> "$INFO_PAGE"
            else
              echo "## Download" >> "$INFO_PAGE"
              echo "" >> "$INFO_PAGE"
              echo "[Full ZIP](https://raw.githubusercontent.com/${REPO}/${BRANCH}/downloads/${video_id}.mp4.zip)" >> "$INFO_PAGE"
            fi

            # --- Add row to index ---
            # Get row number
            ROW=$(( $(wc -l < "$INDEX") - 3 ))
            echo "| ${ROW} | [${TITLE}](https://www.youtube.com/watch?v=${video_id}) | ${QUALITY} | ${video_id} | [Details](./${video_id}.md) |" >> "$INDEX"
          done

      - name: Optimize Git and commit
        if: success()
        run: |
          git config --global http.postBuffer 524288000
          git config --global pack.packSizeLimit 1g
          git config --global pack.deltaCacheSize 256m
          git config --global pack.windowMemory 256m

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add downloads/
          git commit -m "Add downloaded video $(date +%Y%m%d_%H%M%S)" || echo "Nothing to commit"
          git push

      - name: Print password
        if: success()
        run: |
          if ls downloads/*_password.txt 1>/dev/null 2>&1; then
            echo "=============================================="
            echo "Zip file password: ${{ env.ZIP_PASSWORD }}"
            echo "Also saved in video info page and password.txt"
            echo "=============================================="
          fi
