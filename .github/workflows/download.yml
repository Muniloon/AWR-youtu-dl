name: YouTube Downloader with V2Ray Proxy

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Quality (e.g. 720, 1080, best)'
        required: false
        default: 'best'
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set execute permissions for local tools
        run: chmod +x bin/yt-dlp_linux bin/sing-box

      - name: Add socks inbound to V2Ray config
        run: python3 scripts/add_socks_inbound.py

      - name: Start sing-box proxy
        run: |
          ./bin/sing-box run -c config_singbox.json &
          sleep 5

      - name: Ensure ffmpeg is installed
        run: sudo apt-get install -y ffmpeg

      - name: Download video via proxy (with merging)
        run: |
          ./bin/yt-dlp_linux \
            --proxy socks5://127.0.0.1:1080 \
            -f "bestvideo[height<=${{ github.event.inputs.quality }}]+bestaudio/best[height<=${{ github.event.inputs.quality }}]" \
            --merge-output-format mp4 \
            --ffmpeg-location /usr/bin/ffmpeg \
            -o "downloads/%(title)s.%(ext)s" \
            --no-playlist \
            "${{ github.event.inputs.video_url }}"

      - name: Check if download succeeded
        run: |
          if [ -d downloads ] && [ "$(ls -A downloads)" ]; then
            echo "Download successful!"
            ls -lh downloads/
          else
            echo "Download failed."
            exit 1
          fi

      - name: Compress and split large files
        if: success()
        run: |
          cd downloads/
          # Keep original filename but zip it
          for f in *; do
            if [ -f "$f" ]; then
              zip -9 "${f}.zip" "$f"
              # Split if larger than 1.9 GB
              find . -name "${f}.zip" -size +1900M | while read z; do
                split -b 500M -d "$z" "${z%.zip}.part-"
                rm "$z"
              done
              rm "$f"   # remove original uncompressed file
            fi
          done
          cd ..

      - name: Commit and push video to repository
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add downloads/
          git commit -m "Add downloaded video $(date +%Y%m%d_%H%M%S)" || echo "Nothing to commit"
          git push
