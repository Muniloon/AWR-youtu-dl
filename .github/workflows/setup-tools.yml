name: 🔄️Setup Tools

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create bin directory
        run: mkdir -p bin

      - name: Download yt-dlp standalone binary
        run: |
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux -o bin/yt-dlp_linux
          chmod +x bin/yt-dlp_linux

      - name: Download ffmpeg and ffprobe (static builds)
        run: |
          curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz -o ffmpeg.tar.xz
          tar xJf ffmpeg.tar.xz
          cp ffmpeg-*/ffmpeg bin/
          cp ffmpeg-*/ffprobe bin/
          chmod +x bin/ffmpeg bin/ffprobe

      - name: Download WARP standalone binary (warp-go)
        run: |
          curl -L https://github.com/cloudflare/warp-go/releases/latest/download/warp -o bin/warp
          chmod +x bin/warp

      - name: Commit and push tools
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add bin/
          git commit -m "Add tools: yt-dlp, ffmpeg, ffprobe, WARP standalone" || echo "Nothing to commit"
          git push
